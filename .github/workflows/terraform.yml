name: terraform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::861076396381:role/github-actions-compute-comparison
          aws-region: us-east-1

      # FIXED: Build Lambda function
      - name: Build Lambda function
        run: |
          cd app/lambda
          mkdir -p build
          echo "=== Files in lambda directory ==="
          ls -la
          echo ""
          echo "=== Creating handler.zip ==="
          zip -j build/handler.zip handler.py
          echo ""
          echo "=== Build directory contents ==="
          ls -la build/

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=environments/dev fmt -check

      - name: Terraform init
        run: terraform -chdir=environments/dev init

      - name: Terraform validate
        run: terraform -chdir=environments/dev validate

      - name: Terraform plan
        run: terraform -chdir=environments/dev plan -var="ecr_image_uri=${{ secrets.ECR_IMAGE_URI }}" -out=tfplan

      - name: Upload Terraform Plan
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: environments/dev/tfplan
          retention-days: 1

  apply:
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::861076396381:role/github-actions-compute-comparison
          aws-region: us-east-1

      # FIXED: Build Lambda function for apply job
      - name: Build Lambda function
        run: |
          cd app/lambda
          mkdir -p build
          echo "=== Files in lambda directory ==="
          ls -la
          echo ""
          echo "=== Creating handler.zip ==="
          zip -j build/handler.zip handler.py
          echo ""
          echo "=== Build directory contents ==="
          ls -la build/

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=environments/dev init

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: environments/dev

      - name: Terraform apply
        run: terraform -chdir=environments/dev apply tfplan