name: terraform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::861076396381:role/github-actions-compute-comparison
          aws-region: us-east-1

      - name: Build Lambda function
        run: |
          cd app/lambda
          mkdir -p build
          zip -j build/handler.zip handler.py
          cd ../..
          ls -la app/lambda/build/

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=environments/dev fmt -check

      - name: Terraform init
        run: terraform -chdir=environments/dev init -input=false

      - name: Terraform validate
        run: terraform -chdir=environments/dev validate

      - name: Terraform plan
        run: terraform -chdir=environments/dev plan -input=false -var="ecr_image_uri=${{ secrets.ECR_IMAGE_URI }}" -out=tfplan

      - name: Upload Terraform Plan
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: environments/dev/tfplan
          retention-days: 1

      # Upload the exact zip bytes that source_code_hash was computed against.
      # `zip` embeds timestamps, so rebuilding it later (even from identical
      # source) produces a different hash and breaks `terraform apply` on a
      # saved plan with a "function returned an inconsistent result" error.
      - name: Upload Lambda artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: app/lambda/build/handler.zip
          retention-days: 1

  apply:
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        env:
          # Skip the post-job credential cleanup step (not a `with:` input)
          AWS_SKIP_CLEANUP_STEP: true
        with:
          role-to-assume: arn:aws:iam::861076396381:role/github-actions-compute-comparison
          aws-region: us-east-1

      # Use the exact same zip bytes the plan job hashed — do NOT rebuild it
      # here, since `zip` embeds timestamps and a rebuild would produce a
      # different source_code_hash than what's baked into the saved plan.
      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: app/lambda/build

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=environments/dev init -input=false

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: environments/dev

      - name: Terraform apply
        id: terraform_apply
        run: |
          set +e
          terraform -chdir=environments/dev apply -input=false tfplan
          exit_code=$?
          set -e
          echo "apply_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit $exit_code

      - name: Verify Deployment
        if: steps.terraform_apply.outputs.apply_exit_code == '0'
        run: |
          set +e
          echo "Checking deployed endpoints..."

          lambda_128="$(terraform -chdir=environments/dev output -raw lambda_128_endpoint 2>/dev/null)"
          lambda_1024="$(terraform -chdir=environments/dev output -raw lambda_1024_endpoint 2>/dev/null)"
          fargate_dns="$(terraform -chdir=environments/dev output -raw fargate_alb_dns 2>/dev/null)"
          ec2_dns="$(terraform -chdir=environments/dev output -raw ec2_alb_dns 2>/dev/null)"

          check_url() {
            local label="$1" url="$2"
            if [ -z "$url" ]; then
              echo "⚠️ $label: no output value found, skipping"
              return
            fi
            code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$url")"
            echo "$label ($url): HTTP $code"
          }

          # Lambda endpoint outputs are expected to already be full URLs.
          check_url "Lambda 128MB"  "$lambda_128"
          check_url "Lambda 1024MB" "$lambda_1024"
          # ALB DNS outputs are bare hostnames, so build the URL.
          [ -n "$fargate_dns" ] && check_url "Fargate ALB" "http://$fargate_dns/"
          [ -n "$ec2_dns" ]     && check_url "EC2 ALB"     "http://$ec2_dns/"

          exit 0

      # This step will run even if the apply fails
      - name: Post-deployment status
        if: always()
        run: |
          echo "Deployment completed with exit code: ${{ steps.terraform_apply.outputs.apply_exit_code }}"
          if [ "${{ steps.terraform_apply.outputs.apply_exit_code }}" == "0" ]; then
            echo "✅ Terraform apply successful!"
          else
            echo "⚠️ Terraform apply failed, check the logs above"
          fi
